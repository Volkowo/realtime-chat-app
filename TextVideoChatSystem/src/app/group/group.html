<!DOCTYPE html>
<html lang="en" data-bs-theme="auto">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Collapsible Sidebar · Bootstrap v5.3</title>

    <!-- Bootstrap CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

    <!-- Custom CSS -->
    <link href="./group.css" rel="stylesheet">
</head>
<body>
    <main class="flex-nowrap">
        <!-- Sidebar -->
        <div class="row">
            <div class="col-2 p-3 bg-light position-fixed min-vh-100">
                <ul class="list-unstyled ps-0">
                    <li 
                        *ngFor = "let group of groupsJSON" 
                        (click)="selectGroup(group.groupID)" 
                        data-bs-toggle="collapse" 
                        [attr.data-bs-target]="'#group' + group.groupID" 
                        aria-expanded="false" 
                        [attr.aria-controls]="'#group' + group.groupID"
                        class="mb-1">
                        <button class="btn btn-toggle d-inline-flex align-items-center rounded border-0" 
                            data-bs-toggle="collapse" [attr.data-bs-target]="'#group' + group.groupID" aria-expanded="true">
                        {{group.groupName}}
                        </button>
                        <div class="collapse show" [id]="'group' + group.groupID">
                            <ul class="btn-toggle-nav list-unstyled fw-normal pb-1 small">
                                <li *ngFor = "let channel of group.channels">
                                    {{channel.channelName}}
                                </li>
                            </ul>
                        </div>
<!-- 
                        <li 
                            *ngFor = "let group of groupsJSON" 
                            (click)="selectGroup(group.groupID)" 
                            data-bs-toggle="collapse" 
                            [attr.data-bs-target]="'#group' + group.groupID" 
                            aria-expanded="false" 
                            [attr.aria-controls]="'#group' + group.groupID">
                            {{group.groupName}}
                            <div class="collapse" [id]="'group' + group.groupID">
                                <div class="card card-body">
                                    <li *ngFor = "let channel of group.channels">
                                        {{channel.channelName}}
                                    </li>
                                </div>
                            </div>
                        </li> -->
                    </li>
    
                    <li class="mb-1">
                    <button class="btn btn-toggle d-inline-flex align-items-center rounded border-0 collapsed" 
                            data-bs-toggle="collapse" data-bs-target="#account-collapse" aria-expanded="false">
                        Account
                    </button>
                    <div class="collapse" id="account-collapse">
                        <ul class="btn-toggle-nav list-unstyled fw-normal pb-1 small">
                        <li><a href="#" class="link-body-emphasis d-inline-flex text-decoration-none rounded">New...</a></li>
                        <li><a href="#" class="link-body-emphasis d-inline-flex text-decoration-none rounded">Profile</a></li>
                        <li><a href="#" class="link-body-emphasis d-inline-flex text-decoration-none rounded">Settings</a></li>
                        <li><a href="#" class="link-body-emphasis d-inline-flex text-decoration-none rounded">Sign out</a></li>
                        </ul>
                    </div>
                    </li>
                </ul>
            </div>
            <div class="col-10 min-vh-100 offset-2">
                <p>group works!</p>
                <button type="button" class="btn btn-primary" (click)="logOut()">Logout</button>
    

            </div>
        </div>
    </main>

<!-- Bootstrap JS -->
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
