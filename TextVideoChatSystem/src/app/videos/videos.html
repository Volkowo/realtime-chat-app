<div class="container-fluid">

    <div class="row p-2">
        <button mat-raised-button color="primary" class="m-2" [disabled]="isCallStarted" (click)="streamCamera()">Stream with Camera</button>
        <button mat-raised-button color="primary" class="m-2" [disabled]="isCallStarted" (click)="streamScreen()">Stream with Screen</button>
        <button mat-raised-button color="primary" class="m-2" [disabled]="!(isCallStarted)" (click)="endCall()">End Call</button>
    </div>

    <h2>Peers</h2>
    <ul>
        @for(peerID of peerList; track peerID){
            <li>
                <span>{{peerID}}</span>
            </li>
        }
    </ul>

    <div class="video-grid">
        @for(video of videos; track video.userID){
            <span *ngIf="video.userID !== ownID; else currentUserVideoLabel">Peer: {{video.userID}}</span>
            <ng-template #currentUserVideoLabel>
                <span>You: {{video.userID}}</span>
            </ng-template>
            <video [srcObject]="video.srcObject" controls autoplay [muted]="video.muted"></video>
        }
    </div>

</div>
