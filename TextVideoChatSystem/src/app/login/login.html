<p>login works!</p>
<form>
    <div class="form-group">
        <label for="exampleInputEmail1">Email address</label>
        <input type="email" class="form-control" id="exampleInputEmail1" [(ngModel)]="email" name="email">
        <small id="emailHelp" class="form-text text-muted">We WILL share your email with everyone else.</small>
    </div>
    <div class="form-group">
        <label for="exampleInputPassword1">Password</label>
        <input type="password" class="form-control" id="exampleInputPassword1" [(ngModel)]="pass" name="pass">
    </div>
    <button type="button" class="btn btn-primary" (click)="checkLogin()">Submit</button>
</form>
