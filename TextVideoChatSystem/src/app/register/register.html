<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Sign In</title>

  <!-- Bootstrap CSS -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>

    <main class="form-signin text-center">
        <form>
        <h1 class="h1 mb-5 fw-normal">Register</h1>

        <div class="form-floating mb-2">
            <input type="text" class="form-control" id="exampleInputEmail1" [(ngModel)]="email" name="email" placeholder="example@email.com">
            <label for="floatingInput">Email</label>
        </div>
        <div class="form-floating mb-2">
            <input type="text" class="form-control" id="exampleInputEmail1" [(ngModel)]="username" name="username" placeholder="username">
            <label for="floatingInput">Username</label>
        </div>
        <div class="form-floating mb-3">
            <input type="password" class="form-control" id="exampleInputPassword1" [(ngModel)]="password" name="password" placeholder="">
            <label for="floatingPassword">Password</label>
        </div>

        <button type="button" class="btn btn-primary w-100 py-2" (click)="register(username, password, email)">Register</button>
        <div>
            <p class="mt-5 mb-3 text-muted">Already have an account?</p>
            <a class="mt-5 mb-3 text-muted" href="/login">Login here.</a>
        </div>
        </form>
    </main>

    <!-- Bootstrap JS -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
